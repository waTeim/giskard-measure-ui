services:
  giskard-measure-ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: giskard-measure-ui:local
    ports:
      - "8080:8080"
    environment:
      GISKARD_API_BASE: ${GISKARD_API_BASE:-http://giskard-measure:8000}
      METRICS_POLL_MS: "3000"
      LIVE_POLL_MS: "5000"
      INSTANCE_LABEL: local
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 4s
      retries: 3
